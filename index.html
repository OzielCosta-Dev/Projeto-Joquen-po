<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Joken-Pô</title>
</head>

<body>
    <div class="container">
        <h1>JokenPô</h1>
        <div class="buttons">
            <button onclick="jogar('Pedra')" id="rock">&#x1F44A;</button>
            <button onclick="jogar('Papel')" id="paper">&#x1f590;</button>
            <button onclick="jogar('Tesoura')" id="scissors">&#x270c;</button>
        </div>

        <p class="result"></p>
        <p class="yourScore">Sua Pontuação <span class="userScore">0</span></p>
        <p class="machineScore">Pontuação da Alexa: <span class="computerScore">0</span></p>
    </div>

</body>
<script src="./scripts.js"></script>

</html>
